format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$python\
$character
"""

[username]
show_always = true
format = '[$user@]($style)'
style_user = 'fg:172'

[hostname]
format = '[$hostname]($style)'

[directory]
style = "blue"
truncation_length = 3
truncation_symbol = ":‚Ä¶/"

[character]
success_symbol = "[‚ùØ](purple)"
error_symbol = "[‚ùØ](red)"
vimcmd_symbol = "[‚ùÆ](green)"

[git_branch]
symbol = "Ôêò "
format = "[$symbol$branch ]($style) "
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed) ]($style)"
style = "cyan"
conflicted = "‚Äã"
untracked = "‚Äã"
modified = "‚Äã"
staged = "‚Äã"
renamed = "‚Äã"
deleted = "‚Äã"
stashed = "‚â°"

[git_state]
format = '\([$state( $progress_current/$progress_total) ]($style)\) '
style = "bright-black"



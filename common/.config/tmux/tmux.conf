# Enable 256-color and true-color (24-bits) support in tmux
set -g default-terminal 'screen-256color' # set terminal type for 256-color support
set -ga terminal-overrides ',256col*:Tc' # override to enable true-color for compatible terminals

# General
set -g mouse on # Enable mouse support
set -g set-clipboard on # Enable system clipboard
set -g detach-on-destroy off # Don't exit from tmux when closing a session
set -sg escape-time 0 # Eliminate Vim/Neovim escape mode switching latency

# Set prefix key to Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# start indexing windows at one instead of zero
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on # automatically renumber windows when one is closed

# reload hotkey
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Reload tmux config"

# Splitting panes and windows in the current directory path
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# vim-like pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Enable vi mode to allow vim movements
set-window-option -g mode-keys vi

# start selecting text with "v"
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi Escape send -X cancel

# Don't exit copy mode when dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

if-shell "uname | grep -q Darwin" {
  bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'reattach-to-user-namespace pbcopy'
  bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'reattach-to-user-namespace pbcopy'
} {
  bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
  bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
}

# --- Visual Styling (Rosé Pine Moon theme matching Neovim) ---
set -g status-justify left
set -g status-style 'fg=#e0def4 bg=#232136' # Rosé Pine Moon base background and text

# Left and Right Status Content
set -g status-left ' #[fg=#c4a7e7,bold]❐ #S #[fg=#e0def4,nobold]| '
set -g status-right '#[fg=#e0def4,bg=#393552] %d/%m %H:%M '

# Current active window (Iris / Surface accent)
setw -g window-status-current-style 'fg=#c4a7e7 bg=#393552 bold'
setw -g window-status-current-format ' #I:#W#F '

# Inactive windows (Muted text)
setw -g window-status-style 'fg=#6e6a86 bg=#232136'
setw -g window-status-format ' #I:#W#F '

# --- TMUX PLUGINS ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Automatic restore of tmux environment when tmux is started
set -g @continuum-restore 'on'

# Mostrar chuleta en un popup flotante
bind-key / display-popup -w 80% -h 80% -E "cat ~/dotfiles/cheatsheet.md | less -r"

# Initialize TMUX plugin manager (must be at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
